name: Build unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write    # needed to create the GitHub Release

jobs:
  build:
    name: Build SportShorts.ipa
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract MARKETING_VERSION
        id: version
        run: |
          VERSION=$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          if [[ -z "$VERSION" ]]; then
            echo "::error::could not parse MARKETING_VERSION from project.yml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "SportShorts v$VERSION (build ${{ github.run_number }})"

      - name: Select Xcode (latest 26.x)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer" || true
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls -la SportShorts.xcodeproj/

      - name: Build archive (no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project SportShorts.xcodeproj \
            -scheme SportShorts \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/SportShorts.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Package unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -R build/SportShorts.xcarchive/Products/Applications/SportShorts.app build/Payload/
          cd build
          /usr/bin/zip -qry SportShorts-unsigned.ipa Payload/
          ls -lh SportShorts-unsigned.ipa

      - name: Upload artifact (zip; raw .ipa is also published as a release asset below)
        uses: actions/upload-artifact@v4
        with:
          name: SportShorts-unsigned-ipa
          path: build/SportShorts-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Publish as latest release (direct .ipa download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: "SportShorts v${{ steps.version.outputs.version }} (build ${{ github.run_number }})"
          body: |
            Auto-built unsigned IPA for sideloading.

            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Permanent latest-build URL:
            https://github.com/${{ github.repository }}/releases/latest/download/SportShorts-unsigned.ipa
          files: build/SportShorts-unsigned.ipa
          make_latest: true
          draft: false
          prerelease: false

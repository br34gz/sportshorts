# Project spec consumed by XcodeGen. Generates SportShorts.xcodeproj.
# Run locally: xcodegen generate
# In CI: the build workflow installs XcodeGen then runs xcodegen generate before xcodebuild archive.

name: SportShorts
options:
  bundleIdPrefix: com.sportshorts
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

# YouTubeKit removed in v0.4 — AVPlayer-via-stream-extraction was unreliable;
# we use the iframe player directly. Re-add if AVPlayer becomes viable.

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.2.0-preview"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  SportShorts:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SportShorts/Sources
      - path: SportShorts/Resources
        excludes:
          - Info.plist
    resources:
      - path: SportShorts/Resources/Assets.xcassets
      - path: SportShorts/Resources/bundled_channels.json
      - path: SportShorts/Resources/bundled_subreddits.json
    info:
      path: SportShorts/Resources/Info.plist
      properties:
        CFBundleDisplayName: SportShorts
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIDeviceFamily:
          - 1
        UIRequiresFullScreen: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            youtube.com:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
              NSExceptionRequiresForwardSecrecy: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_NAME: SportShorts
        PRODUCT_BUNDLE_IDENTIFIER: com.sportshorts.app
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
